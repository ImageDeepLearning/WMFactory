# High-quality but memory-safer profile for 24GB GPU
# Compared with ultra-fast profile, this restores most visual quality.

panogen:
  fp8_attention: true
  fp8_gemm: true
  cache: false

moge:
  # default is 30/42/4096x2048; these are slightly reduced to avoid OOM spikes.
  resolution_level: 26
  num_views: 32
  merge_max_width: 3072
  merge_max_height: 1536
  batch_size: 2

render:
  render_size: 512

worldfm:
  image_size: 512
  step: 2
